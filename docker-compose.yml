services:
  rh-wallet-gateway:
    build:
      context: ./gateway
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
